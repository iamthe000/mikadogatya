<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>天皇コレクション - Imperial TCG</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&display=swap');

        :root {
            --bg-color: #121212;
            --primary: #c0392b;
            --gold: #f39c12;
            --silver: #bdc3c7;
            --bronze: #cd7f32;
        }

        body {
            font-family: 'Noto Serif JP', serif;
            background-color: var(--bg-color);
            color: white;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 15px;
            text-align: center;
            background: linear-gradient(to bottom, #2c3e50, #1a252f);
            border-bottom: 2px solid var(--gold);
            z-index: 10;
        }

        h1 { margin: 0; font-size: 24px; letter-spacing: 2px; color: var(--gold); }

        .resource-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
            font-size: 14px;
        }

        button {
            padding: 8px 20px;
            font-size: 14px;
            cursor: pointer;
            background: var(--primary);
            color: white;
            border: 1px solid var(--gold);
            border-radius: 5px;
            font-family: inherit;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover { background: #e74c3c; transform: scale(1.05); }

        main {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
        }

        /* --- ホーム画面 --- */
        #home-screen { text-align: center; }
        .pack-display {
            width: 200px;
            height: 300px;
            background: linear-gradient(135deg, #2c3e50, #c0392b);
            margin: 0 auto 20px;
            border-radius: 10px;
            border: 4px solid var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            position: relative;
            cursor: pointer;
        }
        .pack-display::after {
            content: "第一弾\A神話の幕開け";
            white-space: pre;
            text-align: center;
            font-weight: 900;
            font-size: 24px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        /* --- 開封演出エリア --- */
        #opening-screen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 20;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        .instruction {
            position: absolute;
            top: 10%;
            font-size: 18px;
            color: #aaa;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        .card-stack {
            position: relative;
            width: 240px;
            height: 340px;
        }

        .card-container {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s;
            cursor: pointer;
        }

        .card-container.slide-out {
            transform: translateX(-150%) rotateY(180deg) rotateZ(-20deg) !important;
            opacity: 0;
            pointer-events: none;
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: #222;
        }

        .card-back {
            background: repeating-linear-gradient(45deg, #1a1a1a 0, #1a1a1a 10px, #222 10px, #222 20px);
            border: 8px solid #444;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-back::before {
            content: "菊";
            font-size: 60px;
            color: var(--gold);
            opacity: 0.2;
        }

        .card-front {
            transform: rotateY(180deg);
            background: #fdf6e3;
            color: #333;
            border: 8px solid #eee;
        }

        .card-image-area {
            height: 50%;
            background: #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 2px solid #333;
            position: relative;
            background-size: cover;
            background-position: center top;
        }

        .card-info {
            padding: 15px;
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .era-tag {
            font-size: 12px;
            background: #333;
            color: white;
            padding: 3px 8px;
            border-radius: 10px;
            display: inline-block;
            margin-bottom: 5px;
        }

        .card-name { font-size: 22px; font-weight: 900; }
        .card-number { font-size: 12px; color: #666; }

        .rarity-icon {
            position: absolute;
            bottom: -15px;
            right: 10px;
            width: 30px;
            height: 30px;
            background: #333;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            border: 2px solid white;
            z-index: 2;
        }

        /* レアリティ別装飾 */
        .rarity-UR .card-front { border-color: #ff00cc; }
        .rarity-SSR .card-front { border-color: var(--gold); }
        .rarity-SR .card-front { border-color: var(--silver); }

        .holo-effect {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            mix-blend-mode: color-dodge;
            opacity: 0;
        }
        .rarity-UR .holo-effect {
            background: linear-gradient(125deg, rgba(255,0,204,0.4), rgba(51,51,255,0.4), rgba(0,255,255,0.4), rgba(255,0,204,0.4));
            background-size: 400% 400%;
            animation: holoAnim 3s ease infinite;
            opacity: 1;
        }
        @keyframes holoAnim { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

        /* --- リザルト画面 --- */
        #result-screen { display: none; width: 100%; padding: 20px; text-align: center; }
        .result-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 20px; }
        .result-grid .card-container { position: relative; width: 120px; height: 170px; transform: rotateY(180deg); cursor: default; }
        .result-grid .card-name { font-size: 14px; }
        .result-grid .card-front { border-width: 4px; }
        .result-grid .rarity-icon { width: 20px; height: 20px; font-size: 8px; bottom: -10px; }

        /* --- 図鑑 --- */
        #collection-area { display: none; width: 100%; max-width: 800px; padding: 20px; }
        .collection-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; padding: 10px; }
        
        .col-item { 
            position: relative;
            aspect-ratio: 2/3;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .col-item:hover { transform: scale(1.05); z-index: 5; }
        
        .locked { 
            filter: grayscale(1) brightness(0.5);
            opacity: 0.7;
        }

        .preview-card-container {
            width: 280px;
            height: 400px;
            position: relative;
        }
        .preview-card-container .card-container {
            position: relative;
            transform: rotateY(180deg);
        }
    </style>
</head>
<body>

<header>
    <h1>Imperial TCG Pocket</h1>
    <div class="resource-bar">
        <div>Pt: <span id="pt-display">1000</span></div>
        <div>収集率: <span id="comp-display">0/126</span></div>
    </div>
    <div style="margin-top: 15px;">
        <button onclick="nav('home')">ガチャ</button>
        <button onclick="nav('collection')">図鑑</button>
        <button onclick="addPt()" style="background:#27ae60;">Ptチャージ</button>
    </div>
</header>

<main>
    <div id="home-screen">
        <h2 style="margin-bottom: 30px;">拡張パック「神話の幕開け」</h2>
        <div class="pack-display" onclick="buyPack()"></div>
        <button onclick="buyPack()">5枚入りパックを開封 (500 Pt)</button>
    </div>

    <div id="opening-screen">
        <div class="instruction" id="open-inst">カードをタップしてめくる</div>
        <div class="card-stack" id="card-stack"></div>
    </div>

    <div id="result-screen">
        <h2>獲得カード</h2>
        <div class="result-grid" id="result-grid"></div>
        <button onclick="nav('home')" style="margin-top: 30px;">完了</button>
    </div>

    <div id="collection-area">
        <h2>皇統譜図鑑</h2>
        <div class="collection-grid" id="collection-grid"></div>
    </div>
</main>

<div id="preview-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:100; justify-content:center; align-items:center; flex-direction:column;" onclick="closePreview()">
    <div id="preview-content"></div>
    <div style="margin-top:20px; color:white; font-weight:bold; text-shadow:0 2px 4px rgba(0,0,0,0.8);">タップで閉じる</div>
</div>

<script>
    const namesStr = "神武 綏靖 安寧 懿徳 孝昭 孝安 孝霊 孝元 開化 崇神 垂仁 景行 成務 仲哀 応神 仁徳 履中 反正 允恭 安康 雄略 清寧 顕宗 仁賢 武烈 継体 安閑 宣化 欽明 敏達 用明 崇峻 推古 舒明 皇極 孝徳 斉明 天智 弘文 天武 持統 文武 元明 元正 聖武 孝謙 淳仁 称徳 光仁 桓武 平城 嵯峨 淳和 仁明 文徳 清和 陽成 光孝 宇多 醍醐 朱雀 村上 冷泉 円融 花山 一条 三条 後一条 後朱雀 後冷泉 後三条 白河 堀河 鳥羽 崇徳 近衛 後白河 二条 六条 高倉 安徳 後鳥羽 土御門 順徳 仲恭 後堀河 四条 後嵯峨 後深草 亀山 後宇多 伏見 後伏見 後二条 花園 後醍醐 後村上 長慶 後亀山 後小松 称光 後花園 後土御門 後柏原 後奈良 正親町 後陽成 後水尾 明正 後光明 後西 霊元 東山 中御門 桜町 桃園 後桜町 後桃園 光格 仁孝 孝明 明治 大正 昭和 上皇 今上";
    const nameArray = namesStr.split(" ");

    const urIds = [1, 15, 16, 33, 38, 40, 45, 50, 72, 77, 82, 96, 122, 124];
    const ssrIds = [10, 21, 26, 35, 41, 60, 66, 71, 81, 100, 106, 123, 125, 126];
    const srIds = [11, 12, 34, 36, 43, 52, 56, 59, 62, 74, 75, 88, 107, 108, 121];

    function getEra(id) {
        if(id <= 32) return "古代";
        if(id <= 42) return "飛鳥";
        if(id <= 49) return "奈良";
        if(id <= 77) return "平安";
        if(id <= 95) return "鎌倉";
        if(id <= 100) return "南北朝";
        if(id <= 105) return "室町";
        if(id <= 107) return "安土桃山";
        if(id <= 121) return "江戸";
        return "近現代";
    }

    const masterData = nameArray.map((name, index) => {
        const id = index + 1;
        let rarity = "N";
        if(urIds.includes(id)) rarity = "UR";
        else if(ssrIds.includes(id)) rarity = "SSR";
        else if(srIds.includes(id)) rarity = "SR";
        else if(id % 4 === 0) rarity = "R";
        return { id, name: name + (id >= 125 ? "陛下" : "天皇"), rarity, era: getEra(id) };
    });

    function getCardInnerHtml(card, isOwned) {
        return `
            <div class="card-image-area">
                <div class="holo-effect"></div>
                <div class="placeholder-text" style="font-size:40px; opacity:0.2;">${isOwned ? card.name.charAt(0) : '?'}</div>
                <div class="rarity-icon">${isOwned ? card.rarity : '?'}</div>
            </div>
            <div class="card-info">
                <div><span class="era-tag">${isOwned ? card.era : '???'}</span><div class="card-number">第${card.id}代</div></div>
                <div class="card-name">${isOwned ? card.name : '???'}</div>
            </div>`;
    }

    function createCardElement(card, isOwned) {
        const el = document.createElement('div');
        el.className = `card-container rarity-${isOwned ? card.rarity : 'N'}`;
        if (!isOwned) el.classList.add('locked');
        
        el.innerHTML = `
            <div class="card-face card-back"></div>
            <div class="card-face card-front">
                ${getCardInnerHtml(card, isOwned)}
            </div>`;
        
        if (isOwned) applyWikiImage(el, card.name, card.id);
        return el;
    }

    let playerPt = parseInt(localStorage.getItem('imp_pt') || "1000");
    let ownedIds = JSON.parse(localStorage.getItem('imp_owned') || "[]");
    let currentPull = [];
    let currentCardIndex = 0;

    updateHeader();

    function updateHeader() {
        document.getElementById('pt-display').innerText = playerPt;
        document.getElementById('comp-display').innerText = `${ownedIds.length}/126`;
        localStorage.setItem('imp_pt', playerPt);
        localStorage.setItem('imp_owned', JSON.stringify(ownedIds));
    }

    function addPt() { playerPt += 500; updateHeader(); }

    function nav(screen) {
        document.querySelectorAll('main > div').forEach(d => d.style.display = 'none');
        if(screen === 'home') document.getElementById('home-screen').style.display = 'block';
        if(screen === 'collection') { document.getElementById('collection-area').style.display = 'block'; renderCollection(); }
    }

    // --- Wikipedia画像取得ロジック ---
    async function fetchWikiImage(name, id) {
        // Wikipediaの検索ワード調整
        let query = name.replace("陛下", "");
        if (id === 125) query = "明仁"; // 上皇陛下
        if (id === 126) query = "徳仁"; // 今上陛下
        if (!query.endsWith("天皇")) query += "天皇";

        try {
            const url = `https://ja.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`;
            const response = await fetch(url);
            const data = await response.json();
            return data.thumbnail ? data.thumbnail.source : null;
        } catch (e) {
            return null;
        }
    }

    async function applyWikiImage(el, name, id) {
        const imgSrc = await fetchWikiImage(name, id);
        if (imgSrc) {
            const imgArea = el.querySelector('.card-image-area');
            imgArea.style.backgroundImage = `url(${imgSrc})`;
            imgArea.querySelector('.placeholder-text').style.display = 'none';
        }
    }

    function buyPack() {
        if (playerPt < 500) { alert("Pt不足です"); return; }
        playerPt -= 500; updateHeader();
        currentPull = Array.from({length: 5}, () => {
            const rand = Math.random() * 100;
            let rarity = rand < 2 ? "UR" : rand < 10 ? "SSR" : rand < 30 ? "SR" : rand < 60 ? "R" : "N";
            const pool = masterData.filter(e => e.rarity === rarity);
            const card = pool[Math.floor(Math.random() * pool.length)];
            if(!ownedIds.includes(card.id)) ownedIds.push(card.id);
            return card;
        });
        updateHeader();
        startOpeningSequence();
    }

    function startOpeningSequence() {
        nav('none');
        document.getElementById('opening-screen').style.display = 'flex';
        const stack = document.getElementById('card-stack');
        stack.innerHTML = '';
        currentCardIndex = 4;

        currentPull.forEach((card, i) => {
            const el = createCardElement(card, true);
            el.style.zIndex = i;
            el.style.transform = `translateZ(${-i * 5}px) rotateZ(${(Math.random()-0.5)*4}deg)`;
            
            el.onclick = () => {
                if(i !== currentCardIndex) return;
                if(!el.style.transform.includes('rotateY(180deg)')) {
                    el.style.transform = `translateZ(20px) rotateY(180deg)`;
                    document.getElementById('open-inst').innerText = "タップで次へ";
                } else {
                    el.classList.add('slide-out');
                    currentCardIndex--;
                    if(currentCardIndex < 0) setTimeout(showResult, 500);
                    else document.getElementById('open-inst').innerText = "タップしてめくる";
                }
            };
            stack.appendChild(el);
        });
    }

    function showResult() {
        nav('none');
        document.getElementById('result-screen').style.display = 'block';
        const grid = document.getElementById('result-grid');
        grid.innerHTML = '';
        [...currentPull].reverse().forEach(card => {
            const el = createCardElement(card, true);
            el.style.transform = "none";
            const front = el.querySelector('.card-front');
            front.style.transform = "none";
            front.style.borderWidth = "4px";
            el.querySelector('.card-back').style.display = "none";
            
            el.querySelector('.card-name').style.fontSize = "12px";
            el.querySelector('.era-tag').style.fontSize = "8px";
            const rarityIcon = el.querySelector('.rarity-icon');
            rarityIcon.style.width = "20px";
            rarityIcon.style.height = "20px";
            rarityIcon.style.fontSize = "8px";
            rarityIcon.style.bottom = "-10px";

            grid.appendChild(el);
        });
    }

    function showPreview(cardId) {
        const card = masterData.find(c => c.id === cardId);
        if (!card) return;
        const modal = document.getElementById('preview-modal');
        const content = document.getElementById('preview-content');
        content.innerHTML = '';
        
        const cardEl = createCardElement(card, true);
        const container = document.createElement('div');
        container.className = 'preview-card-container';
        container.appendChild(cardEl);
        content.appendChild(container);
        
        modal.style.display = 'flex';
    }

    function closePreview() {
        document.getElementById('preview-modal').style.display = 'none';
    }

    function renderCollection() {
        const grid = document.getElementById('collection-grid');
        grid.innerHTML = '';
        masterData.forEach(card => {
            const owned = ownedIds.includes(card.id);
            const el = createCardElement(card, owned);
            el.classList.add('col-item');
            el.style.transform = "none";
            
            // 図鑑用にスタイル微調整
            const front = el.querySelector('.card-front');
            front.style.transform = "none";
            front.style.borderWidth = "4px";
            el.querySelector('.card-back').style.display = "none";
            el.querySelector('.card-name').style.fontSize = "12px";
            el.querySelector('.era-tag').style.fontSize = "8px";
            const rarityIcon = el.querySelector('.rarity-icon');
            rarityIcon.style.width = "20px";
            rarityIcon.style.height = "20px";
            rarityIcon.style.fontSize = "8px";
            rarityIcon.style.bottom = "-10px";

            if (owned) {
                el.onclick = () => showPreview(card.id);
            }
            grid.appendChild(el);
        });
    }
</script>
</body>
</html>
