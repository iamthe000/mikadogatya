<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天皇コレクション - パック開封</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --card-back: #2c3e50;
            --gold: #f1c40f;
            --silver: #bdc3c7;
            --bronze: #cd7f32;
            --ur-gradient: linear-gradient(45deg, #ff00cc, #3333ff);
        }

        body {
            font-family: "Hiragino Mincho ProN", serif;
            background-color: var(--bg-color);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            padding: 20px;
            text-align: center;
        }

        .nav {
            margin-bottom: 20px;
        }

        button {
            padding: 10px 25px;
            font-size: 16px;
            cursor: pointer;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            transition: 0.3s;
            margin: 5px;
        }

        button:hover { transform: scale(1.05); background: #ff5e4d; }
        button:disabled { background: #555; }

        /* パック開封エリア */
        #pack-area {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            perspective: 1000px;
            min-height: 300px;
        }

        /* カードのスタイル */
        .card-container {
            width: 160px;
            height: 240px;
            position: relative;
            cursor: pointer;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .card-container.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            border: 4px solid #fff;
        }

        /* 裏面 */
        .card-back {
            background: var(--card-back);
            background-image: repeating-linear-gradient(45deg, #34495e 0, #34495e 10px, #2c3e50 10px, #2c3e50 20px);
        }

        .card-back::after {
            content: "菊紋"; /* 簡略化 */
            font-size: 40px;
            opacity: 0.3;
        }

        /* 表面 */
        .card-front {
            background: #fff;
            color: #333;
            transform: rotateY(180deg);
            padding: 10px;
            text-align: center;
            box-sizing: border-box;
        }

        .rarity-label {
            font-size: 12px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        /* レアリティ演出 */
        .UR { border-color: #ff00cc; background: var(--ur-gradient); color: white; }
        .SSR { border-color: var(--gold); background: #fffde7; }
        .SR { border-color: var(--silver); background: #f5f5f5; }

        /* 図鑑エリア */
        #collection-area {
            display: none;
            width: 90%;
            max-width: 1000px;
            padding: 20px;
        }

        .collection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
        }

        .collection-item {
            background: #333;
            padding: 10px;
            border-radius: 5px;
            font-size: 11px;
            text-align: center;
            opacity: 0.4;
        }

        .collection-item.owned {
            opacity: 1;
            background: #444;
            border: 1px solid var(--gold);
        }

        .stats { margin-top: 10px; color: var(--gold); }
    </style>
</head>
<body>

<header>
    <h1>Imperial Gacha Deck</h1>
    <div class="nav">
        <button onclick="showGacha()">ガチャを引く</button>
        <button onclick="showCollection()">コレクション図鑑</button>
    </div>
    <div id="status-msg">「5連ガチャ」でパックを開封せよ</div>
</header>

<main>
    <div id="gacha-screen">
        <div style="text-align:center; margin-bottom: 20px;">
            <button onclick="startGacha()">5連パック開封！</button>
        </div>
        <div id="pack-area"></div>
    </div>

    <div id="collection-area">
        <div class="stats" id="stats-text">所持数: 0 / 126</div>
        <hr>
        <div class="collection-grid" id="collection-grid"></div>
    </div>
</main>

<script>
    // データ定義（簡易版：実際には126代分入れる想定）
    const masterData = [
        { id: 1, name: "神武天皇", rarity: "UR" },
        { id: 15, name: "応神天皇", rarity: "SSR" },
        { id: 16, name: "仁徳天皇", rarity: "SSR" },
        { id: 33, name: "推古天皇", rarity: "SR" },
        { id: 38, name: "天智天皇", rarity: "SSR" },
        { id: 40, name: "天武天皇", rarity: "SSR" },
        { id: 45, name: "聖武天皇", rarity: "SR" },
        { id: 50, name: "桓武天皇", rarity: "SSR" },
        { id: 77, name: "後白河天皇", rarity: "SR" },
        { id: 82, name: "後鳥羽天皇", rarity: "SR" },
        { id: 96, name: "後醍醐天皇", rarity: "UR" },
        { id: 122, name: "明治天皇", rarity: "UR" },
        { id: 124, name: "昭和天皇", rarity: "SR" },
        { id: 125, name: "上皇陛下", rarity: "SSR" },
        { id: 126, name: "今上天皇", rarity: "UR" }
    ];

    // Nランクとして残りの代を補完
    for(let i=1; i<=126; i++) {
        if(!masterData.find(e => e.id === i)) {
            masterData.push({ id: i, name: `第${i}代天皇`, rarity: "N" });
        }
    }

    let ownedIds = JSON.parse(localStorage.getItem('ownedEmperors') || "[]");

    function showGacha() {
        document.getElementById('gacha-screen').style.display = 'block';
        document.getElementById('collection-area').style.display = 'none';
    }

    function showCollection() {
        document.getElementById('gacha-screen').style.display = 'none';
        document.getElementById('collection-area').style.display = 'block';
        renderCollection();
    }

    function renderCollection() {
        const grid = document.getElementById('collection-grid');
        grid.innerHTML = '';
        masterData.sort((a,b) => a.id - b.id).forEach(emp => {
            const isOwned = ownedIds.includes(emp.id);
            const div = document.createElement('div');
            div.className = `collection-item ${isOwned ? 'owned' : ''}`;
            div.innerHTML = `<div>第${emp.id}代</div><div>${isOwned ? emp.name : '？？？'}</div>`;
            grid.appendChild(div);
        });
        document.getElementById('stats-text').innerText = `コンプリート率: ${ownedIds.length} / 126`;
    }

    function startGacha() {
        const packArea = document.getElementById('pack-area');
        packArea.innerHTML = '';
        
        for(let i=0; i<5; i++) {
            const result = pullOne();
            saveCollection(result.id);
            createCardElement(result, packArea, i);
        }
    }

    function pullOne() {
        const rand = Math.random() * 100;
        let rarity = "N";
        if(rand < 3) rarity = "UR";
        else if(rand < 10) rarity = "SSR";
        else if(rand < 30) rarity = "SR";
        
        const pool = masterData.filter(e => e.rarity === rarity);
        return pool[Math.floor(Math.random() * pool.length)];
    }

    function saveCollection(id) {
        if(!ownedIds.includes(id)) {
            ownedIds.push(id);
            localStorage.setItem('ownedEmperors', JSON.stringify(ownedIds));
        }
    }

    function createCardElement(data, container, delay) {
        const wrapper = document.createElement('div');
        wrapper.className = 'card-container';
        wrapper.style.transitionDelay = `${delay * 0.1}s`;
        
        wrapper.innerHTML = `
            <div class="card-face card-back"></div>
            <div class="card-face card-front ${data.rarity}">
                <div class="rarity-label">${data.rarity}</div>
                <div style="font-size:12px">第${data.id}代</div>
                <div style="font-size:18px; font-weight:bold; margin-top:10px;">${data.name}</div>
            </div>
        `;

        wrapper.onclick = function() {
            this.classList.toggle('is-flipped');
        };

        container.appendChild(wrapper);
    }
</script>

</body>
</html>
